name: Feature Request
description: Suggest a new feature or middleware package
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      description: What kind of feature is this?
      options:
        - New middleware package
        - Enhancement to existing package
        - New authentication strategy
        - New caching strategy
        - New rate limiting strategy
        - Logger enhancement
        - Developer experience improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Related Package
      description: Which package does this relate to?
      options:
        - "@mcp-toolkit/auth"
        - "@mcp-toolkit/cache"
        - "@mcp-toolkit/rate-limit"
        - "@mcp-toolkit/logger"
        - New package
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: If you have ideas for the API, share them here.
      render: typescript
      placeholder: |
        // Example API usage
        withMyFeature(server, {
          option: "value",
        });

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, references, or screenshots about the feature request.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to contribute this feature?
      options:
        - label: I would be willing to submit a PR for this feature
